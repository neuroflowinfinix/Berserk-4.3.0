<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Berserk WASM Test</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 40px auto; background:#111; color:#eee; }
    #output { background:#000; padding:12px; height:400px; overflow-y:auto; white-space:pre-wrap; }
    #cmd { width:78%; padding:6px; background:#222; color:#eee; border:1px solid #555; }
    button { padding:6px 14px; }
  </style>
</head>
<body>
  <h2>Berserk 4.3.0 WASM</h2>
  <div id="output"></div>
  <br>
  <input id="cmd" type="text" placeholder="Enter UCI command…" />
  <button onclick="send()">Send</button>
  <script>
    const out = document.getElementById('output');
    const inp = document.getElementById('cmd');
    const worker = new Worker('../src/worker.js');
    worker.onmessage = (e) => { out.textContent += e.data + '\n'; out.scrollTop = out.scrollHeight; };
    function send() {
      const cmd = inp.value.trim();
      if (!cmd) return;
      out.textContent += '> ' + cmd + '\n';
      worker.postMessage(cmd);
      inp.value = '';
    }
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
    worker.postMessage('uci');
  </script>
</body>
</html>
